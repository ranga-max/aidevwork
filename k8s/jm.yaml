apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-jobmanager
spec:
  replicas: 1
  selector:
    matchLabels:
            app: flink
            component: jobmanager      
  template:
    metadata:
      labels:
        app: flink
        component: jobmanager
    spec:
      containers:
      - name: jobmanager
        image: rrchak/cpflinklocal 
        imagePullPolicy: IfNotPresent  
        args:
        - jobmanager
        ports:
        - containerPort: 6123
          name: rpc
        - containerPort: 6124
          name: blob
        - containerPort: 6125
          name: query
        - containerPort: 8081
          name: ui
        livenessProbe:
          tcpSocket:
            port: 6123
          initialDelaySeconds: 30
          periodSeconds: 60    
        env:
        - name: JOB_MANAGER_RPC_ADDRESS
          value: jobmanager
        volumeMounts:
        - name: flink-config-volume
          mountPath: /opt/flink/conf
        #securityContext:
        #  runAsUser: 9999  # refers to user _flink_ from official flink image, change if necessary
      volumes:
      - name: flink-config-volume
        configMap:
          name: flink-config
          items:
          - key: flink-conf.yaml
            path: flink-conf.yaml
          - key: log4j-console.properties
            path: log4j-console.properties  
          - key: "hive-site.xml"
            path: "hive-site.xml"     
