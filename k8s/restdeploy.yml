apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-rest-catalog
  labels:
    app: iceberg-rest-catalog
spec:
  replicas: 1 # Adjust as needed for high availability
  selector:
    matchLabels:
      app: iceberg-rest-catalog
  template:
    metadata:
      labels:
        app: iceberg-rest-catalog
    spec:
      volumes:
      - name: log4j2
        configMap:
           name: rest-log4j2-cm
           items:
            - key: "log4j2-properties"
              path: "log4j2-properties"
      containers:
      - name: iceberg-rest-catalog
        image: tabulario/iceberg-rest:latest # Use a specific version if preferred
        ports:
        - containerPort: 8181
          name: http
        volumeMounts:
         - mountPath: /var/tmp/
           name: log4j2
        env:
        - name: SERVER_PORT
          value: "8181"  
        - name: CATALOG_WAREHOUSE
          value: "s3a://warehouse/" # Replace with your S3/MinIO bucket
        - name: CATALOG_IO__IMPL
          value: "org.apache.iceberg.aws.s3.S3FileIO"
        - name: CATALOG_S3_ENDPOINT
          value: "http://minio:9000"
        - name: AWS_REGION
          value: "us-east-1"    
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: iceberg-s3-credentials
              key: aws_access_key_id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: iceberg-s3-credentials
              key: aws_secret_access_key
                
            

